        const music = document.getElementById('bg-music');
        const muteBtn = document.getElementById('mute-btn');
        let isPlaying = false;

        // Переменная для контроля таймера, чтобы они не накладывались друг на друга
        let hideTimeout = null;

        muteBtn.onclick = () => {
            if (isPlaying) { 
                music.pause(); 
                muteBtn.innerText = "Музыка: Выкл"; 
            } else { 
                music.play().catch(e => console.log(e)); 
                muteBtn.innerText = "Музыка: Вкл"; 
            }
            isPlaying = !isPlaying;
        };

        function createBackgroundDots() {
            const container = document.getElementById('background-field');
            for (let i = 0; i < 60; i++) {
                const dot = document.createElement('div');
                dot.className = 'bg-dot';
                dot.style.left = Math.random() * 100 + '%';
                dot.style.top = Math.random() * 100 + '%';
                dot.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(dot);
            }
        }

        function createChamomiles() {
            const container = document.body;
            messages.forEach((msg) => {
                const chamomile = document.createElement('div');
                chamomile.className = 'chamomile';
                chamomile.style.left = Math.random() * 95 + 'vw';
                chamomile.style.top = Math.random() * 90 + 'vh';
                chamomile.style.animationDelay = (Math.random() * 3) + 's';
                
                chamomile.innerHTML = `
                    <div class="chamomile-inner">
                        <div class="petal"></div>
                        <div class="petal"></div>
                        <div class="petal"></div>
                        <div class="petal"></div>
                        <div class="petal"></div>
                        <div class="petal"></div>
                        <div class="petal"></div>
                        <div class="petal"></div>
                        <div class="center-core"></div>
                    </div>
                `;

                chamomile.onclick = () => {
                    const msgContainer = document.getElementById('message-container');
                    document.getElementById('message-text').innerText = msg;
                    msgContainer.classList.add('show');
                    chamomile.classList.add('hidden');

                    // Отменяем прошлый таймер, если игрок кликает быстро на другую ромашку
                    if (hideTimeout) clearTimeout(hideTimeout);

                    // Время отображения зависит от длины текста: минимум 5 секунд, 
                    // а для длинных строк — еще дольше (примерно 70 миллисекунд на один символ)
                    const displayTime = Math.max(5000, msg.length * 70);

                    hideTimeout = setTimeout(() => {
                        msgContainer.classList.remove('show');
                    }, displayTime);
                };
                container.appendChild(chamomile);
            });
        }

        createBackgroundDots();
        createChamomiles();
